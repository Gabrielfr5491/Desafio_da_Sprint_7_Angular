<div class="app-layout">

  <!-- MENU (sidebar) -->
  <nav class="sidebar" [class.active]="isSidebarActive" [class.collapsed]="isSidebarCollapsed">
    <div class="sidebar-logo" (click)="onLogoClick()" role="button" tabindex="0" title="Expandir/Recolher menu">
      <img src="/img/ford.png" alt="Ford Logo">
    </div>

    <ul class="sidebar-menu">
      <li>
        <a routerLink="/home" routerLinkActive="active" class="sidebar-link" title="Home">
          <i class="bi bi-house-door-fill"></i>
          <span>Home</span>
        </a>
      </li>
      <li>
        <a routerLink="/dashboard" routerLinkActive="active" class="sidebar-link" title="Dashboard">
          <i class="bi bi-speedometer2"></i>
          <span>Dashboard</span>
        </a>
      </li>
    </ul>

    <div class="sidebar-footer">
      <div class="user-profile mb-3 d-flex align-items-center gap-2" title="{{ currentUser()?.nome || 'Admin' }}">
        <div class="avatar">
          <i class="bi bi-person-circle"></i>
        </div>
        <div class="user-details overflow-hidden">
          <div class="user-name text-truncate">{{ currentUser()?.nome || 'Admin' }}</div>
          <div class="user-email text-truncate text-muted small">{{ currentUser()?.email || 'admin@email.com' }}</div>
        </div>
      </div>

      <button (click)="onLogout()" class="btn btn-outline-danger w-100 logout-btn" title="Sair">
        <i class="bi bi-box-arrow-right"></i>
        <span>Sair</span>
      </button>
    </div>
  </nav>
  <!-- FIM MENU -->

  <div class="sidebar-overlay" [class.active]="isSidebarActive" (click)="toggleSidebar()"></div>

  <header class="mobile-navbar">
    <img
      src="/img/ford.png"
      alt="Ford Logo"
      class="top-logo ford-mobile-trigger"
      (click)="toggleSidebar()">
  </header>

  <main class="main-content home-bg">
    <div class="container-fluid h-100 d-flex flex-column justify-content-center align-items-center flex-grow-1">
      <div class="welcome-card-box text-center glass-card animate-fade-in p-5">
        <div class="logo-wrapper mb-4">
          <img src="/img/ford.png" alt="Ford Logo" class="welcome-logo">
        </div>
        <h4 class="system-title">Sistema de dados FORD</h4>
        <h1 class="welcome-text my-3">Seja bem-vindo(a)!</h1>
        <p class="description-text text-muted mb-4">
          Gerencie e analise a telemetria, atualizações de softwares e dados de vendas da frota global Ford Connect.
        </p>
        <div class="d-flex justify-content-center gap-3">
          <a routerLink="/dashboard" class="btn btn-ford px-4 py-2">
            <i class="bi bi-grid-fill me-2"></i>
            Acessar Dashboard
          </a>
        </div>
      </div>
    </div>
  </main>

</div>
